name: Web CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  typecheck-and-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify GraphQL codegen is up to date
        run: |
          npm run codegen
          git diff --exit-code schema.graphql src/lib/api/generated/
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      # Notas sobre lo que NO corre aquí:
      # - `npm run build`: `generateStaticParams` en /tienda/[handle] hace fetch
      #   al API en build time. Sin API en CI (y sin service-container) el build
      #   falla con ECONNREFUSED. Es un comportamiento pre-existente, no una
      #   regresión de la migración a codegen. Habilitar cuando se resuelva:
      #     a) Skip del fetch cuando process.env.CI esté set.
      #     b) Dynamic params sin pre-render.
      #     c) Service container del API en el workflow.
      # - `npm run lint`: hay 2 errores pre-existentes fuera de los archivos
      #   que esta migración toca (Preloader.tsx, useMediaQuery.ts).
      #   Habilitar después de una limpieza separada.
